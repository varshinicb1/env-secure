name: Build Cross-Platform Binaries

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            target: bun-linux-x64
            ext: ""
          - os: ubuntu-latest
            name: linux-arm64
            target: bun-linux-arm64
            ext: ""
          - os: macos-latest
            name: macos-arm64
            target: bun-darwin-arm64
            ext: ""
          - os: macos-13
            name: macos-x64
            target: bun-darwin-x64
            ext: ""
          - os: windows-latest
            name: windows-x64
            target: bun-windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile binary
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            --outfile="dist/env-secure-${{ matrix.name }}${{ matrix.ext }}" \
            src/index.ts

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-secure-${{ matrix.name }}
          path: dist/env-secure-${{ matrix.name }}${{ matrix.ext }}

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          body: |
            ## 📦 Download

            Download the executable for your platform below. No Node.js required!

            | Platform | Download |
            |----------|----------|
            | 🪟 Windows x64 | `env-secure-windows-x64.exe` |
            | 🍎 macOS (Apple Silicon) | `env-secure-macos-arm64` |
            | 🍎 macOS (Intel) | `env-secure-macos-x64` |
            | 🐧 Linux x64 | `env-secure-linux-x64` |
            | 🐧 Linux ARM64 | `env-secure-linux-arm64` |

            ### 🔍 Scan your codebase for leaked secrets

            ```bash
            # Scan current directory
            ./env-secure

            # Generate .env.example + encrypted vault
            ./env-secure --env --vault

            # CI mode
            ./env-secure --ci
            ```
